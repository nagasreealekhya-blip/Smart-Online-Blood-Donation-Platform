<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlow | Login - Smart Blood Donation Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/login style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="page-header">
                <div class="logo-wrapper">
                    <i class="fas fa-droplet"></i>
                </div>
                <h1 class="page-title">LifeFlow</h1>
                <p class="page-subtitle">LOGIN</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="input-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Enter your email address" autocomplete="email" required>
                    </div>
                    <div id="emailError" class="validation-message"></div>
                </div>

                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="passwordError" class="validation-message"></div>
                </div>

                <div class="input-group">
                    <label for="roleSelect">
                        <i class="fas fa-user-tag"></i>
                        Select Role
                    </label>
                    <div class="input-wrapper">
                        <select id="roleSelect" name="role">
                            <option value="donor" selected>Donor</option>
                            <option value="patient">Patient</option>
                            <option value="hospital">Hospital</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-checkbox">
                        <input type="checkbox" id="rememberMe" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">
                        <i class="fas fa-question-circle"></i>
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div id="validationSummary" class="validation-summary hidden">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="summaryText"></span>
                </div>

                <div class="register-section">
                    <span class="register-text">Don't have an account?</span>
                    <a href="register.html" class="register-link">
                        Create Account <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> Reset Password</h3>
                <button type="button" class="modal-close" id="closeModal" aria-label="Close reset password dialog">&times;</button>
            </div>
            <div class="modal-body">
                <p>Enter your email address and we'll send you instructions to reset your password.</p>
                <div class="input-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email">
                </div>
                <div id="resetMessage" class="reset-message"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="cancelReset">Cancel</button>
                <button type="button" class="btn-primary" id="sendReset">Send Instructions</button>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const forgotLink = document.getElementById('forgotPassword');
        const forgotModal = document.getElementById('forgotModal');
        const closeModalBtn = document.getElementById('closeModal');
        const cancelResetBtn = document.getElementById('cancelReset');
        const sendResetBtn = document.getElementById('sendReset');
        const resetEmailInput = document.getElementById('resetEmail');
        const resetMessage = document.getElementById('resetMessage');
        const validationSummary = document.getElementById('validationSummary');
        const summaryText = document.getElementById('summaryText');

        function setError(id, message) {
            document.getElementById(id).textContent = message;
        }

        function openModal() {
            forgotModal.classList.add('active');
            forgotModal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            forgotModal.classList.remove('active');
            forgotModal.setAttribute('aria-hidden', 'true');
            resetMessage.textContent = '';
            resetMessage.className = 'reset-message';
        }

        togglePasswordBtn.addEventListener('click', () => {
            const showPassword = passwordInput.type === 'password';
            passwordInput.type = showPassword ? 'text' : 'password';
            togglePasswordBtn.innerHTML = showPassword
                ? '<i class="fas fa-eye-slash"></i>'
                : '<i class="fas fa-eye"></i>';
        });

        forgotLink.addEventListener('click', (event) => {
            event.preventDefault();
            openModal();
        });

        closeModalBtn.addEventListener('click', closeModal);
        cancelResetBtn.addEventListener('click', closeModal);

        sendResetBtn.addEventListener('click', () => {
            if (!resetEmailInput.value.trim()) {
                resetMessage.textContent = 'Enter your email address first.';
                resetMessage.className = 'reset-message error';
                return;
            }

            resetMessage.textContent = 'Password reset instructions have been prepared for this demo.';
            resetMessage.className = 'reset-message success';
        });

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();
            setError('emailError', '');
            setError('passwordError', '');
            validationSummary.classList.add('hidden');
            validationSummary.classList.remove('success');

            let hasError = false;

            if (!emailInput.value.trim()) {
                setError('emailError', 'Email is required.');
                hasError = true;
            }

            if (!passwordInput.value.trim()) {
                setError('passwordError', 'Password is required.');
                hasError = true;
            }

            if (hasError) {
                summaryText.textContent = 'Please complete the required fields.';
                validationSummary.classList.remove('hidden');
                return;
            }

            summaryText.textContent = 'Demo login successful. Open the dashboard page that matches the selected role.';
            validationSummary.classList.remove('hidden');
            validationSummary.classList.add('success');
        });
    </script>
</body>
</html>
